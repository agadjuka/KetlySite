<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>AR — Ketly</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #000; overflow: hidden; height: 100%; width: 100%; }

    #back-btn {
      position: fixed;
      top: max(env(safe-area-inset-top), 16px);
      left: 16px;
      z-index: 9999;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 10px 18px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      text-decoration: none;
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
    }

    #reset-btn {
      position: fixed;
      top: max(env(safe-area-inset-top), 16px);
      right: 16px;
      z-index: 9999;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 10px 14px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      display: none;
      cursor: pointer;
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
    }

    #hint {
      position: fixed;
      bottom: max(env(safe-area-inset-bottom), 32px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: rgba(0,0,0,0.6);
      color: rgba(255,255,255,0.9);
      border-radius: 20px;
      padding: 10px 24px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      text-align: center;
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      pointer-events: none;
      transition: opacity 0.4s;
      white-space: nowrap;
    }
    #hint.hidden { opacity: 0; }

    .a-loader-title, .a-enter-vr, .a-enter-ar { display: none !important; }

    #dbg {
      position: fixed;
      top: 60px; right: 12px;
      z-index: 99999;
      background: rgba(0,0,0,0.75);
      color: #0f0;
      font-family: monospace;
      font-size: 10px;
      padding: 6px 8px;
      border-radius: 6px;
      max-width: 200px;
      max-height: 160px;
      overflow-y: auto;
      line-height: 1.5;
    }
    #dbg .err { color: #f55; }
    #dbg .ok  { color: #4f4; }
    #dbg .inf { color: #aaf; }
  </style>

  <script src="/vendor/8frame-latest.js"></script>
  <script src="/vendor/8thwall/xr.js" data-preload-chunks="slam"></script>
</head>
<body>
  <a id="back-btn" href="/ar-table">← Назад</a>
  <button id="reset-btn" onclick="resetPlacement()">↺ Переставить</button>

  <div id="hint">Наводите камеру на горизонтальную поверхность…</div>

  <div id="dbg">init…</div>
  <div id="ar-root"></div>

  <script>
    var TARGET_SIZE = 0.3; // 30 cm

    // ── Debug Logging ────────────────────────────────────────────────────────
    var dbgEl = document.getElementById('dbg');
    function log(msg, type) {
      if (!dbgEl) return;
      var d = document.createElement('div');
      d.className = type || 'inf';
      d.textContent = msg;
      dbgEl.appendChild(d);
      dbgEl.scrollTop = dbgEl.scrollHeight;
      console.log('[AR]', msg);
      try {
        fetch('/api/ar-log', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ level: type || 'inf', msg: msg }),
        }).catch(function() {});
      } catch(e) {}
    }
    window.addEventListener('error', function(e) {
      log('ERR: ' + e.message, 'err');
    });
    window.addEventListener('unhandledrejection', function(e) {
      log('REJ: ' + String(e.reason && e.reason.message || e.reason), 'err');
    });

    log('AFRAME: ' + (typeof AFRAME !== 'undefined' ? AFRAME.version : 'NOT FOUND'), typeof AFRAME !== 'undefined' ? 'ok' : 'err');

    // ── WebXR Patch ──────────────────────────────────────────────────────────
    (function patchWebxrGetAttribute() {
      if (typeof AFRAME === 'undefined' || !AFRAME.AEntity || !AFRAME.AEntity.prototype) return;
      var proto = AFRAME.AEntity.prototype;
      if (proto.__ketlyWebxrPatched) return;
      var orig = proto.getAttribute;
      proto.__ketlyWebxrPatched = true;
      proto.getAttribute = function(attr) {
        var v = orig.call(this, attr);
        if (attr === 'webxr') {
          if (v == null || typeof v !== 'object') {
            return { optionalFeatures: ['anchors'] };
          }
          if (!Array.isArray(v.optionalFeatures)) v.optionalFeatures = [];
          return v;
        }
        return v;
      };
      log('webxr getAttribute patch ✓', 'ok');
    })();

    // ── State & UI ───────────────────────────────────────────────────────────
    window.arPlaced = false;
    window.arLastHit = null;
    window._pizzaFinalScale = TARGET_SIZE; // fallback

    function setHint(text) {
      var h = document.getElementById('hint');
      if (h) { h.textContent = text; h.classList.remove('hidden'); }
    }
    function hideHint() {
      var h = document.getElementById('hint');
      if (h) h.classList.add('hidden');
    }

    function resetPlacement() {
      window.arPlaced = false;
      window.arLastHit = null;
      document.getElementById('reset-btn').style.display = 'none';
      
      var model = document.getElementById('pizza-model');
      if (model) model.setAttribute('visible', 'false');
      
      var reticle = document.getElementById('surface-reticle');
      if (reticle) reticle.setAttribute('visible', 'false'); // hide until new hit

      setHint('Наводите камеру на горизонтальную поверхность…');
      log('Placement reset', 'inf');
    }
    window.resetPlacement = resetPlacement;

    // ── Components ───────────────────────────────────────────────────────────
    function registerComponents() {
      if (typeof AFRAME === 'undefined') return;

      // Tap to place Component
      if (!AFRAME.components['tap-to-place']) {
        AFRAME.registerComponent('tap-to-place', {
          init: function() {
            log('tap-to-place init', 'ok');
            this.placeModel = this.placeModel.bind(this);
            window.addEventListener('touchstart', this.placeModel, {passive: false});
            window.addEventListener('click', this.placeModel);
          },
          placeModel: function(e) {
            if (window.arPlaced || !window.arLastHit) return;
            if (e.type === 'touchstart') e.preventDefault();

            var model = document.getElementById('pizza-model');
            var reticle = document.getElementById('surface-reticle');
            if (!model) { log('No pizza-model found', 'err'); return; }

            if (reticle) reticle.setAttribute('visible', 'false');

            var pos = window.arLastHit.position;
            model.setAttribute('position', pos);
            
            var scale = window._pizzaFinalScale || TARGET_SIZE;
            model.setAttribute('animation', {
              property: 'scale',
              from: '0.001 0.001 0.001',
              to: scale + ' ' + scale + ' ' + scale,
              easing: 'easeOutElastic',
              dur: 800
            });
            model.setAttribute('visible', 'true');

            window.arPlaced = true;
            document.getElementById('reset-btn').style.display = 'block';
            
            setHint('Модель размещена — можете обойти вокруг');
            setTimeout(hideHint, 4000);
            log('Model placed at ' + pos.x.toFixed(2) + ', ' + pos.y.toFixed(2) + ', ' + pos.z.toFixed(2), 'ok');
          }
        });
      }

      // Auto Scale Component
      if (!AFRAME.components['auto-scale-to-size']) {
        AFRAME.registerComponent('auto-scale-to-size', {
          schema: { size: { type: 'number', default: TARGET_SIZE } },
          init: function() {
            this.el.addEventListener('model-loaded', this.onModelLoaded.bind(this));
          },
          onModelLoaded: function() {
            var mesh = this.el.getObject3D('mesh');
            if (!mesh) return;
            var box = new THREE.Box3().setFromObject(mesh);
            var size = new THREE.Vector3();
            box.getSize(size);
            var maxDim = Math.max(size.x, size.z);
            if (maxDim === 0) return;
            var factor = this.data.size / maxDim;
            this.el.setAttribute('scale', factor + ' ' + factor + ' ' + factor);
            window._pizzaFinalScale = factor;
            log('Model loaded. Scale factor: ' + factor.toFixed(3), 'ok');
          }
        });
      }

      // Hit Test Component
      if (!AFRAME.components['surface-hit-test']) {
        AFRAME.registerComponent('surface-hit-test', {
          init: function() {
            log('surface-hit-test init', 'ok');
            this.arReady = false;
            this._hadSurface = false;
            var self = this;
            this.el.sceneEl.addEventListener('realityready', function() {
              log('realityready event received', 'ok');
              self.arReady = true;
            });
            setTimeout(function() { 
              if (!self.arReady) log('force arReady', 'inf');
              self.arReady = true; 
            }, 3000);
          },
          tick: function() {
            if (!this.arReady || window.arPlaced) return;
            if (!window.XR8 || !XR8.XrController || !XR8.XrController.hitTest) return;

            var hits;
            try {
              hits = XR8.XrController.hitTest(0.5, 0.5, ['FEATURE_POINT']);
            } catch(e) {
              return; // ignore silent failures
            }

            var reticle = document.getElementById('surface-reticle');
            if (hits && hits.length > 0) {
              var hit = hits[0];
              window.arLastHit = hit;
              if (reticle) {
                reticle.setAttribute('position', hit.position);
                reticle.setAttribute('visible', 'true');
              }
              if (!this._hadSurface) {
                this._hadSurface = true;
                setHint('Поверхность найдена — нажмите, чтобы разместить');
                log('Surface found', 'ok');
              }
            } else {
              window.arLastHit = null;
              if (reticle) reticle.setAttribute('visible', 'false');
              if (this._hadSurface) {
                this._hadSurface = false;
                setHint('Наводите камеру на горизонтальную поверхность…');
              }
            }
          }
        });
      }
    }

    // ── Main Flow ────────────────────────────────────────────────────────────
    function onXrLoaded() {
      log('xrloaded event ✓', 'ok');

      if (window.XR8 && XR8.AFrame && typeof AFRAME !== 'undefined') {
        try {
          if (!AFRAME.components['xrconfig'])
            AFRAME.registerComponent('xrconfig', XR8.AFrame.xrconfigComponent());
          if (!AFRAME.components['xrweb'])
            AFRAME.registerComponent('xrweb', XR8.AFrame.xrwebComponent());
          log('xr components registered ✓', 'ok');
        } catch(e) { log('reg ERR: ' + e.message, 'err'); }
      }

      registerComponents();

      var root = document.getElementById('ar-root');
      root.innerHTML = ''; // clear

      // Create scene dynamically (this is the safest pattern proven in the old file)
      var scene = document.createElement('a-scene');
      scene.setAttribute('xrconfig', 'cameraDirection: back; allowedDevices: mobile-and-headsets');
      scene.setAttribute('xrweb', 'scale: absolute');
      scene.setAttribute('webxr', { optionalFeatures: ['anchors'] });
      scene.setAttribute('vr-mode-ui', 'enabled: false');
      scene.setAttribute('renderer', 'antialias: true; alpha: true');
      scene.setAttribute('tap-to-place', '');
      scene.setAttribute('surface-hit-test', '');
      
      scene.innerHTML = [
        '<a-assets timeout="10000">',
        '  <a-asset-item id="pizza-asset" src="/models/pizza.glb"></a-asset-item>',
        '</a-assets>',
        '<a-camera id="camera" position="0 1.6 0" look-controls="enabled: false"></a-camera>',
        '<a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>',
        '<a-light type="directional" color="#ffffff" light="castShadow: true" position="-1 2 1" intensity="0.8" shadow-camera-automatic=""></a-light>',
        '<a-entity',
        '  id="pizza-model"',
        '  gltf-model="#pizza-asset"',
        '  visible="false"',
        '  position="0 0 0"',
        '  auto-scale-to-size="size: 0.3"',
        '  shadow="cast: true; receive: false">',
        '</a-entity>',
        '<a-entity',
        '  id="surface-reticle"',
        '  geometry="primitive: ring; radiusInner: 0.15; radiusOuter: 0.2"',
        '  material="color: #ffffff; shader: flat; opacity: 0.8; transparent: true"',
        '  rotation="-90 0 0"',
        '  visible="false">',
        '</a-entity>'
      ].join('\n');

      root.appendChild(scene);
      log('a-scene injected ✓', 'ok');
    }

    if (window.XR8) {
      onXrLoaded();
    } else {
      log('waiting xrloaded…', 'inf');
      window.addEventListener('xrloaded', onXrLoaded);
    }
  </script>
</body>
</html>
