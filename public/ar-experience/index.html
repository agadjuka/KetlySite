<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>AR — Ketly</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #000; overflow: hidden; height: 100%; width: 100%; }

    #back-btn {
      position: fixed;
      top: max(env(safe-area-inset-top), 16px);
      left: 16px;
      z-index: 9999;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 10px 18px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
    }

    #hint {
      position: fixed;
      bottom: max(env(safe-area-inset-bottom), 32px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: rgba(0, 0, 0, 0.55);
      color: rgba(255, 255, 255, 0.85);
      border-radius: 20px;
      padding: 9px 22px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      white-space: nowrap;
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      pointer-events: none;
      transition: opacity 0.4s;
    }

    #hint.hidden { opacity: 0; }

    /* Убираем стандартный A-Frame loading overlay */
    .a-loader-title { display: none !important; }
    .a-enter-vr { display: none !important; }
  </style>

  <!--
    Порядок ВАЖЕН:
    1. XR8 движок (с SLAM чанком)
    2. 8frame (модифицированный A-Frame)
    Оба — синхронные script теги в <head>, не async/defer.
    Это единственный надёжный способ — XR8 должен быть готов
    до того как 8frame зарегистрирует xrweb/xrconfig компоненты.
  -->
  <script src="/api/8thwall/xr.js" data-preload-chunks="slam"></script>
  <script src="/vendor/8frame-latest.js"></script>
</head>
<body>
  <a id="back-btn" href="/ar-table">← Назад</a>
  <div id="hint">Наведите камеру на горизонтальную поверхность</div>

  <!--
    xrconfig + xrweb — обязательная пара для world tracking (SLAM).
    <a-camera position="0 8 0"> — камера на высоте 8 юнитов,
    это стандартный трюк 8th Wall: высота камеры задаёт масштаб сцены.
    Модель на position="0 0 0" лежит на определённой плоскости.
  -->
  <a-scene
    xrconfig="cameraDirection: back; allowedDevices: mobile-and-headsets"
    xrweb="scale: responsive"
    vr-mode-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="pizza" src="/api/ar-model/plaggy_cc0-pizza-572.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 8 0"></a-camera>

    <a-gltf-model
      id="pizza-model"
      src="#pizza"
      position="0 0 0"
      rotation="0 0 0"
      scale="0.3 0.3 0.3"
    ></a-gltf-model>
  </a-scene>

  <script>
    // Прячем подсказку после 6 секунд
    setTimeout(function () {
      var hint = document.getElementById('hint');
      if (hint) hint.classList.add('hidden');
    }, 6000);
  </script>
</body>
</html>
